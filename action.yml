name: Save Secret File
description: Decode a base64-encoded secret and save it to a file
branding:
  icon: lock
  color: purple

inputs:
  secret:
    description: Base64-encoded file content
    required: true
  path:
    description: File path to save the decoded content
    required: true

runs:
  using: composite
  steps:
    - name: Save secret file
      shell: bash
      run: |
        mkdir -p "$(dirname "$FILE_PATH")"
        echo "$SECRET_CONTENT" | base64 -D > "$FILE_PATH"
      env:
        SECRET_CONTENT: ${{ inputs.secret }}
        FILE_PATH: ${{ inputs.path }}
